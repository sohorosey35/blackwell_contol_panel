<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Monitor</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <h1>System Monitor</h1>
            <div class="status">
                <span class="dot"></span>
                <span id="connection-status">Connecting...</span>
            </div>
        </header>

        <main class="grid">
            <div class="card">
                <div class="card-header">
                    <h2>CPU Load</h2>
                    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M9 3v2m6-2v2M9 19v2m6-2v2M5 9H3m2 6H3m18-6h-2m2 6h-2M7 19h10a2 2 0 002-2V7a2 2 0 00-2-2H7a2 2 0 00-2 2v10a2 2 0 002 2zM9 9h6v6H9V9z" />
                    </svg>
                </div>
                <div class="value" id="cpu-val">0.0%</div>
                <div class="progress-bar">
                    <div class="progress" id="cpu-bar"></div>
                </div>
            </div>

            <div class="card">
                <div class="card-header">
                    <h2>Memory Usage</h2>
                    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 002-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10" />
                    </svg>
                </div>
                <div class="value" id="mem-val">0.00 / 0.00 GB</div>
                <div class="progress-bar">
                    <div class="progress" id="mem-bar"></div>
                </div>
            </div>
            
            <div class="card">
                <div class="card-header">
                    <h2>GPU Utilization</h2>
                    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M12 2l3 6 6 .5-4.5 4 1.5 6-6-3.5-6 3.5 1.5-6-4.5-4 6-.5 3-6z" />
                    </svg>
                </div>
                <div class="value" id="gpu-util-val">0.0%</div>
                <div class="progress-bar">
                    <div class="progress" id="gpu-util-bar"></div>
                </div>
            </div>

            <div class="card">
                <div class="card-header">
                    <h2>GPU Memory</h2>
                    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M4 7v10c0 2 1.5 3 4 3h8c2.5 0 4-1 4-3V7c0-2-1.5-3-4-3H8c-2.5 0-4 1-4 3zM4 12h16M8 4v16M16 4v16" />
                    </svg>
                </div>
                <div class="value" id="gpu-mem-val">0.00 / 0.00 GB</div>
                <div class="progress-bar">
                    <div class="progress" id="gpu-mem-bar"></div>
                </div>
            </div>
            
            <div class="card">
                <div class="card-header">
                    <h2>Disk Space</h2>
                    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16M7 6v12M17 6v12" />
                    </svg>
                </div>
                <div class="value" id="disk-val">0.00 / 0.00 GB</div>
                <div class="progress-bar">
                    <div class="progress" id="disk-bar"></div>
                </div>
            </div>

            <div class="card text-card">
                <div class="card-header">
                    <h2>Uptime</h2>
                    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
                    </svg>
                </div>
                <div class="value text-value" id="uptime-val">0s</div>
            </div>

            <div class="card text-card">
                <div class="card-header">
                    <h2>Operating System</h2>
                    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M5 12h14M5 12a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v4a2 2 0 01-2 2M5 12a2 2 0 00-2 2v4a2 2 0 002 2h14a2 2 0 002-2v-4a2 2 0 00-2-2m-2-4h.01M17 16h.01" />
                    </svg>
                </div>
                <div class="value text-value" id="os-val">-</div>
            </div>
        </main>

        <div class="ports-section">
            <div class="ports-header">
                <h2>Open Ports & Services</h2>
                <div class="ports-controls">
                    <input type="text" id="ports-filter" placeholder="Filter by port, app, or status...">
                    <span class="badge" id="ports-count">0 listening</span>
                </div>
            </div>
            <div class="table-container">
                <table class="ports-table">
                    <thead>
                        <tr>
                            <th data-sort="port" class="sortable">Port <span class="sort-icon"></span></th>
                            <th data-sort="protocol" class="sortable">Protocol <span class="sort-icon"></span></th>
                            <th data-sort="process" class="sortable">Process / App <span class="sort-icon"></span></th>
                            <th data-sort="state" class="sortable">Status <span class="sort-icon"></span></th>
                        </tr>
                    </thead>
                    <tbody id="ports-body">
                        <!-- Port rows injected here -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
